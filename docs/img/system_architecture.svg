<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <style>
      .title{font:700 64px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#0b2f5b}
      .h{font:700 42px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#10233f}
      .t{font:500 30px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#1f1f1f}
      .box{rx:20;ry:20;stroke:#445;stroke-width:4}
    </style>
    <marker id="a" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f6f8fb"/>
  <text x="40" y="90" class="title">System Architecture</text>

  <rect x="80" y="180" width="460" height="210" class="box" fill="#dff0ff"/>
  <text x="120" y="250" class="h">Main Loop</text>
  <text x="120" y="305" class="t">Init -> CW Mode -> Freq Mode</text>

  <rect x="670" y="180" width="460" height="210" class="box" fill="#e7fbe8"/>
  <text x="710" y="250" class="h">CW Decoder</text>
  <text x="710" y="305" class="t">Goertzel / Dot-Dash / Text</text>

  <rect x="1260" y="180" width="460" height="210" class="box" fill="#ffece3"/>
  <text x="1300" y="250" class="h">Freq Detector</text>
  <text x="1300" y="305" class="t">ADC + FFT / Peak Hz</text>

  <rect x="360" y="520" width="1080" height="220" class="box" fill="#f0f3ff"/>
  <text x="410" y="595" class="h">Common Layer</text>
  <text x="410" y="655" class="t">GPIO / ADC / Switch / Timer / TFT API</text>

  <line x1="540" y1="285" x2="670" y2="285" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="1130" y1="285" x2="1260" y2="285" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="900" y1="390" x2="900" y2="520" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
</svg>
