<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <style>
      .title{font:700 64px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#0b2f5b}
      .h{font:700 42px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#10233f}
      .t{font:500 30px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#1f1f1f}
      .box{rx:20;ry:20;stroke:#445;stroke-width:4}
    </style>
    <marker id="a" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f6f8fb"/>
  <text x="40" y="90" class="title">Mode Transition</text>

  <rect x="130" y="220" width="620" height="280" class="box" fill="#dff0ff"/>
  <text x="190" y="300" class="h">CW Mode</text>
  <text x="190" y="360" class="t">SW1: To Freq Mode</text>
  <text x="190" y="410" class="t">SW2: US/JP, SW3: Tone</text>

  <rect x="1050" y="220" width="620" height="280" class="box" fill="#ffece3"/>
  <text x="1110" y="300" class="h">Freq Mode</text>
  <text x="1110" y="360" class="t">SW1: To CW Mode</text>
  <text x="1110" y="410" class="t">FFT + Peak Frequency</text>

  <rect x="390" y="620" width="1020" height="220" class="box" fill="#e8fbe9"/>
  <text x="450" y="700" class="h">Boot and Control</text>
  <text x="450" y="755" class="t">SystemInit -> GPIO -> TFT -> while(1)</text>

  <line x1="750" y1="330" x2="1050" y2="330" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="1050" y1="390" x2="750" y2="390" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <text x="860" y="300" class="t">SW1</text>
  <text x="860" y="430" class="t">SW1</text>
</svg>
