<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <style>
      .title{font:700 64px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#0b2f5b}
      .h{font:700 30px 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans CJK JP',sans-serif;fill:#10233f}
      .box{rx:20;ry:20;stroke:#445;stroke-width:4}
    </style>
    <marker id="a" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f6f8fb"/>
  <text x="40" y="90" class="title">CW Decoder Flow</text>

  <rect x="60"  y="330" width="250" height="200" class="box" fill="#dff0ff"/>
  <rect x="345" y="330" width="250" height="200" class="box" fill="#e8fbe9"/>
  <rect x="630" y="330" width="250" height="200" class="box" fill="#ffece3"/>
  <rect x="915" y="330" width="250" height="200" class="box" fill="#dff0ff"/>
  <rect x="1200" y="330" width="250" height="200" class="box" fill="#e8fbe9"/>
  <rect x="1485" y="330" width="250" height="200" class="box" fill="#ffece3"/>

  <text x="185" y="420" class="h" text-anchor="middle">1. Get Frame</text>
  <text x="470" y="420" class="h" text-anchor="middle">2. Goertzel</text>
  <text x="755" y="420" class="h" text-anchor="middle">3. Filter State</text>
  <text x="1040" y="420" class="h" text-anchor="middle">4. Dot / Dash</text>
  <text x="1325" y="420" class="h" text-anchor="middle">5. Gap Classify</text>
  <text x="1610" y="420" class="h" text-anchor="middle">6. decode() + UI</text>

  <line x1="310" y1="430" x2="345" y2="430" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="595" y1="430" x2="630" y2="430" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="880" y1="430" x2="915" y2="430" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="1165" y1="430" x2="1200" y2="430" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
  <line x1="1450" y1="430" x2="1485" y2="430" stroke="#333" stroke-width="5" marker-end="url(#a)"/>
</svg>
