; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = genericCH32V006F8U6

[env:ch32v003f4p6_evt_r0]
platform = ch32v
framework = ch32v003fun
monitor_speed = 115200
board = ch32v003f4p6_evt_r0
;build_flags = -lc -Os -DTFT_ST7789
build_flags = -lc -Os -DTFT_ST7735
; Generate .bin after build
extra_scripts = post:make_firmware_bin.py

[env:genericCH32V006F8U6]
platform = ch32v
framework = ch32v003fun
monitor_speed = 115200
board = genericCH32V006F8U6
;build_flags = -lc -Os -DTFT_ST7789 -DBOARD_CH32V006
build_flags = -lc -Os -DTFT_ST7735 -DBOARD_CH32V006
extra_scripts = post:make_firmware_bin.py
